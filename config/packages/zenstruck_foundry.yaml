when@dev: &dev
    # See full configuration: https://symfony.com/bundles/ZenstruckFoundryBundle/current/index.html#full-default-bundle-configuration
    zenstruck_foundry:
        persistence:
            # Flush only once per call of `PersistentObjectFactory::create()`
            flush_once: true

when@test:
    zenstruck_foundry:
        persistence:
            flush_once: true
    services:
        App\Tests\Factory\:
            resource: '%kernel.project_dir%/tests/Factory/'
            autowire: true
            autoconfigure: true
        App\Tests\ResetDatabase\:
            resource: '%kernel.project_dir%/tests/ResetDatabase/'
            autowire: true
            autoconfigure: true
