api_platform:
    title: Hospes API
    version: 1.0.0
    description: |
        REST API for independent lodging hosts.

        ## Versioning
        This API uses URI-based versioning. All endpoints are served under /api/ (current: v1).
        When breaking changes are introduced, a new version prefix (/api/v2/) will be added
        while maintaining the previous version for a deprecation period.
        The current version is also available via the X-API-Version response header.
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    patch_formats:
          json: ['application/merge-patch+json']
    swagger:
          api_keys:
              JWT:
                  name: Authorization
                  type: header
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
        pagination_maximum_items_per_page: 100

when@prod:
    api_platform:
        enable_docs: false
        enable_entrypoint: false
