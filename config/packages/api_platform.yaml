api_platform:
    title: Hospes API
    version: 0.0.1
    formats:
        jsonld: ['application/ld+json']
        json: ['application/json']
    patch_formats:
          json: ['application/merge-patch+json']
    swagger:
          api_keys:
              JWT:
                  name: Authorization
                  type: header
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
