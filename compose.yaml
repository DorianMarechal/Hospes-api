services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hospes
      POSTGRES_USER: hospes
      POSTGRES_PASSWORD: hospes
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospes"]
      interval: 5s
      timeout: 3s
      retries: 5

  php:
    build:
      context: .
      target: prod
    depends_on:
      database:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://hospes:hospes@database:5432/hospes?serverVersion=17&charset=utf8"
      APP_SECRET: "%env(APP_SECRET)%"
    volumes:
      - jwt-keys:/app/config/jwt

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - php

volumes:
  db-data:
  jwt-keys:
