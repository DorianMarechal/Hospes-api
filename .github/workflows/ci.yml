name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

      - name: PHPStan
        run: vendor/bin/phpstan analyse -l 6 --memory-limit=512M src

  unit:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: vendor/bin/phpunit --testsuite=unit

  functional:
    name: Functional Tests
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: hospes_test
          POSTGRES_USER: hospes
          POSTGRES_PASSWORD: hospes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hospes:hospes@127.0.0.1:5432/hospes_test?serverVersion=17&charset=utf8
      APP_ENV: test
      JWT_PASSPHRASE: hospes_test

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, intl
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Generate JWT keys
        run: |
          mkdir -p config/jwt
          openssl genpkey -out config/jwt/private.pem -aes256 -algorithm rsa -pkeyopt rsa_keygen_bits:4096 -pass pass:hospes_test
          openssl pkey -in config/jwt/private.pem -out config/jwt/public.pem -pubout -passin pass:hospes_test

      - name: Enable btree_gist extension
        run: PGPASSWORD=hospes psql -h 127.0.0.1 -U hospes -d hospes_test -c 'CREATE EXTENSION IF NOT EXISTS btree_gist;'

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction
        env:
          JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
          JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'

      - name: Run functional tests
        run: vendor/bin/phpunit --testsuite=functional
        env:
          JWT_SECRET_KEY: '%kernel.project_dir%/config/jwt/private.pem'
          JWT_PUBLIC_KEY: '%kernel.project_dir%/config/jwt/public.pem'
